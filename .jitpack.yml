before_install:
  - set -x
  # NOTE: do not delete bin/ (it contains proyek's project definition bin/project.cmd) and
  # append kekinian's versions.properties to this repo's copy rather than replacing it
  # (the repo's copy pins forms-specific dependencies such as forms_rt and flatlaf)
  - rm -f bin/init.sh bin/sireum init.properties
  - curl -fJLo init.properties https://raw.githubusercontent.com/sireum/kekinian/master/versions.properties
  - curl -fJLo bin/init.sh https://raw.githubusercontent.com/sireum/kekinian/master/bin/init.sh
  - curl -fJLo bin/sireum https://raw.githubusercontent.com/sireum/kekinian/master/bin/sireum
  - cat init.properties >> versions.properties
  - chmod +x bin/init.sh bin/sireum
  # JitPack's builder image cannot validate download.bell-sw.com's TLS certificate (stale
  # CA bundle), so init.sh's JDK download fails leaving no file (hamr-sysml-parser works
  # around the same issue with an 'insecure' .curlrc). Instead, pre-seed init.sh's download
  # cache with the identical artifact from BellSoft's Liberica GitHub releases -- GitHub's
  # certificates validate fine there -- so init.sh skips the bell-sw download entirely.
  - JV=$(grep "^org.sireum.version.java=" versions.properties | cut -d= -f2)
  - mkdir -p "$HOME/Downloads/sireum"
  - curl -fJLo "$HOME/Downloads/sireum/bellsoft-jdk${JV}-linux-amd64-full.tar.gz" "https://github.com/bell-sw/Liberica/releases/download/${JV/+/%2B}/bellsoft-jdk${JV}-linux-amd64-full.tar.gz"
  - SIREUM_NO_SETUP=true bin/init.sh
install:
  - set -x
  - unset JAVA_TOOL_OPTIONS
  - bin/sireum proyek publish --target jvm . org.sireum.forms
  - rm -fR lib/cache
